<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="robots" content="noindex, nofollow">
<title>Cam</title>

<script>
/* ============================================================
   CONFIG — aucun secret ici. Le code peut rester public.
   ID VDO.Ninja, mot de passe et session chat arrivent par le #.

   Adresse à mettre en favori :
   .../suunbear-cam/#id=TON_ID&pw=TON_MDP&chat=TA_SESSION
   ============================================================ */
const CONFIG = {

  // --- VDO.Ninja ---
  QUALITY     : 0,            // 0 = 1080p | 1 = 720p | 2 = 360p
  BITRATE     : 4000,         // kbps. Descendre à 2500 si ça saccade en 4G

  // --- Chat (Social Stream Ninja) ---
  // {SESSION} est remplacé par la valeur passée dans le #.
  // Pour changer de thème, remplace "rainbowpuke" par un autre.
  CHAT_URL    : "https://socialstream.ninja/themes/rainbowpuke/index.html?session={SESSION}",

  CHAT_HEIGHT : 45,           // % de la hauteur d'écran occupée par le chat
  CHAT_ANCHOR : "bottom",     // "bottom" ou "top"
  CHAT_SIDE   : 4,            // marge gauche/droite en %

  // --- Lisibilité ---
  SCRIM       : 0.30,         // voile sombre derrière le chat. 0 = aucun, 1 = noir

  // --- Sécurité ---
  CONFIRM_EXIT: true          // demande confirmation avant de quitter/rafraîchir
};
</script>

<style>
:root { --scrim: 0.30; --chatH: 45%; --chatSide: 4%; }

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background:#000;
  overflow:hidden;
  overscroll-behavior:none;          /* tue le pull-to-refresh */
  -webkit-tap-highlight-color:transparent;
}

/* --- Couche 1 : la caméra --- */
#cam {
  position:fixed; inset:0;
  width:100%; height:100%;
  border:0;
  z-index:1;
}

/* --- Couche 2 : le voile de lisibilité --- */
#scrim {
  position:fixed; left:0; right:0;
  height:var(--chatH);
  z-index:2;
  pointer-events:none;
  opacity:var(--scrim);
  transition:opacity .25s ease;
}
#scrim.bottom { bottom:0; background:linear-gradient(to top, #000 0%, transparent 100%); }
#scrim.top    { top:0;    background:linear-gradient(to bottom, #000 0%, transparent 100%); }

/* --- Couche 3 : le chat --- */
#chat {
  position:fixed;
  left:var(--chatSide); right:var(--chatSide);
  height:var(--chatH);
  border:0;
  background:transparent;
  z-index:3;
  pointer-events:none;               /* les taps traversent vers la caméra */
  transition:opacity .25s ease;
}
#chat.bottom { bottom:env(safe-area-inset-bottom, 0px); }
#chat.top    { top:env(safe-area-inset-top, 0px); }

#chat.hidden, #scrim.hidden { opacity:0; }

/* --- Bouton chat --- */
#toggle {
  position:fixed;
  top:calc(env(safe-area-inset-top, 0px) + 10px);
  right:10px;
  z-index:10;
  width:46px; height:46px;
  border:0; border-radius:14px;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:#fff;
  font:600 19px/1 system-ui, sans-serif;
  display:grid; place-items:center;
  cursor:pointer;
}
#toggle:active { background:rgba(0,0,0,.7); }
#toggle.off { opacity:.4; }
#toggle.none { display:none; }

/* --- Écran d'aide si l'ID manque --- */
#setup {
  position:fixed; inset:0;
  z-index:20;
  display:none;
  place-items:center;
  padding:2rem;
  background:#000;
  color:#fff;
  font:15px/1.6 system-ui, sans-serif;
  text-align:center;
}
#setup.show { display:grid; }
#setup code {
  display:block;
  margin-top:1rem;
  padding:.9rem;
  border-radius:10px;
  background:#161616;
  color:#9fe3a0;
  font:13px/1.5 ui-monospace, monospace;
  word-break:break-all;
}

@media (prefers-reduced-motion: reduce) {
  #chat, #scrim, #toggle { transition:none; }
}
</style>
</head>

<body>

<iframe id="cam"
        allow="camera; microphone; autoplay; display-capture; fullscreen; screen-wake-lock"
        allowfullscreen></iframe>

<div id="scrim"></div>

<iframe id="chat" scrolling="no"></iframe>

<button id="toggle" aria-label="Afficher ou masquer le chat">💬</button>

<div id="setup">
  <div>
    Ajoute tes identifiants à la fin de l'adresse.
    <code>#id=TON_ID&amp;pw=TON_MDP&amp;chat=TA_SESSION</code>
  </div>
</div>

<script>
(() => {
  const C = CONFIG;

  /* ------------------------------------------------------------
     Les identifiants viennent du fragment (#), jamais du code.
     Un fragment n'est jamais envoyé au serveur : ni GitHub ni
     Cloudflare ne le voient passer. Le ? est accepté en secours.
     ------------------------------------------------------------ */
  const frag  = new URLSearchParams(location.hash.slice(1));
  const query = new URLSearchParams(location.search);
  const get   = k => (frag.get(k) || query.get(k) || '').trim();

  const ID      = get('id');
  const PW      = get('pw');
  const SESSION = get('chat');

  if (!ID) {
    document.getElementById('setup').classList.add('show');
    return;
  }

  const root   = document.documentElement;
  const cam    = document.getElementById('cam');
  const chat   = document.getElementById('chat');
  const scrim  = document.getElementById('scrim');
  const toggle = document.getElementById('toggle');

  /* --- Applique la config au CSS --- */
  root.style.setProperty('--scrim',    C.SCRIM);
  root.style.setProperty('--chatH',    C.CHAT_HEIGHT + '%');
  root.style.setProperty('--chatSide', C.CHAT_SIDE + '%');

  chat.classList.add(C.CHAT_ANCHOR);
  scrim.classList.add(C.CHAT_ANCHOR);

  /* --- Caméra : lien VDO.Ninja --- */
  let src = 'https://vdo.ninja/?push=' + encodeURIComponent(ID)
          + '&webcam'
          + '&quality='      + C.QUALITY
          + '&videobitrate=' + C.BITRATE
          + '&fullscreen'
          + '&largepreview';

  // Le mot de passe part dans le fragment de l'iframe, pas dans la requête
  if (PW) src += '#password=' + encodeURIComponent(PW);

  cam.src = src;

  /* --- Chat : overlay Social Stream Ninja --- */
  if (SESSION) {
    chat.src = C.CHAT_URL.replace('{SESSION}', encodeURIComponent(SESSION));
  } else {
    // Pas de session fournie : la caméra fonctionne seule
    chat.style.display = 'none';
    scrim.style.display = 'none';
    toggle.classList.add('none');
  }

  /* --- Bouton afficher / masquer --- */
  let visible = true;
  toggle.addEventListener('click', () => {
    visible = !visible;
    chat.classList.toggle('hidden',  !visible);
    scrim.classList.toggle('hidden', !visible);
    toggle.classList.toggle('off',   !visible);
  });

  /* --- Garde l'écran allumé --- */
  let lock = null;
  const keepAwake = async () => {
    try { lock = await navigator.wakeLock.request('screen'); }
    catch (e) { /* non supporté ou refusé : la veille système prend le relais */ }
  };
  if ('wakeLock' in navigator) {
    keepAwake();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') keepAwake();
    });
  }

  /* --- Anti-rafraîchissement accidentel --- */
  if (C.CONFIRM_EXIT) {
    window.addEventListener('beforeunload', e => {
      e.preventDefault();
      e.returnValue = '';
    });
  }
})();
</script>

</body>
</html>
