<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="robots" content="noindex, nofollow">
<title>Cam</title>

<script>
/* ============================================================
   SUUNBEAR CAM — caméra du téléphone + chat, pour Twitch
   Aucun secret dans ce fichier : le dépôt peut rester public.

   Favori à mettre sur l'écran d'accueil du téléphone :
   .../suunbear-cam/#id=TON_ID&pw=TON_MDP&chat=TA_SESSION

   « chat » attend l'ID de session seul, pas une URL.

   Options en plus, à ajouter dans le # :
     &theme=dock|sample|t3nk3y|rainbow   habillage du chat
     &dev                               affiche le bouton 🎨
   ============================================================ */
const CONFIG = {

  /* --- Caméra (VDO.Ninja) --- */
  QUALITY : 0,       // 0 = 1080p | 1 = 720p | 2 = 360p
  BITRATE : 4000,    // kbps. Descendre à 2500 si ça saccade en 4G

  /* --- Chat (Social Stream Ninja) --- */
  THEME   : "dock",
  CSS_URL : "https://suunbear.github.io/suunbear-cam/chat.css",

  CHAT_HEIGHT : 62,        // % de la hauteur d'écran occupée par le chat
  CHAT_ANCHOR : "bottom",  // "bottom" ou "top"
  CHAT_SIDE   : 2,         // marge gauche/droite en %

  /* --- Lisibilité --- */
  SCRIM : 0.35,            // voile sombre derrière le chat. 0 = aucun

  /* --- Sécurité --- */
  CONFIRM_EXIT : true      // confirmation avant de quitter ou rafraîchir
};

/* {SESSION} et {CSS} sont remplacés au chargement. */
const THEMES = {
  dock    : "https://socialstream.ninja/dock.html?session={SESSION}&compact&darkmode&css={CSS}",
  sample  : "https://socialstream.ninja/sampleoverlay.html?session={SESSION}",
  t3nk3y  : "https://socialstream.ninja/themes/t3nk3y/?session={SESSION}",
  rainbow : "https://socialstream.ninja/themes/rainbowpuke/index.html?session={SESSION}"
};
</script>

<style>
:root {
  --scrim   : 0.35;
  --chatH   : 62%;
  --chatSide: 2%;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background:#000;
  overflow:hidden;
  overscroll-behavior:none;              /* tue le pull-to-refresh */
  -webkit-tap-highlight-color:transparent;
}

/* ---------- Couche 1 : la caméra ---------- */
#cam {
  position:fixed; inset:0;
  width:100%; height:100%;
  border:0;
  z-index:1;
}

/* ---------- Couche 2 : le voile de lisibilité ---------- */
#scrim {
  position:fixed; left:0; right:0;
  height:var(--chatH);
  z-index:2;
  pointer-events:none;
  opacity:var(--scrim);
  transition:opacity .25s ease;
}
#scrim.bottom { bottom:0; background:linear-gradient(to top,    #000 0%, transparent 100%); }
#scrim.top    { top:0;    background:linear-gradient(to bottom, #000 0%, transparent 100%); }

/* ---------- Couche 3 : le chat ---------- */
#chat {
  position:fixed;
  left:var(--chatSide); right:var(--chatSide);
  height:var(--chatH);
  border:0;
  background:transparent;
  z-index:3;
  pointer-events:none;                   /* les taps traversent vers la caméra */
  transition:opacity .25s ease;
}
#chat.bottom { bottom:env(safe-area-inset-bottom, 0px); }
#chat.top    { top:env(safe-area-inset-top, 0px); }

#chat.hidden, #scrim.hidden { opacity:0; }

/* ---------- Boutons ---------- */
.btn {
  position:fixed; right:10px;
  z-index:10;
  width:46px; height:46px;
  border:0; border-radius:14px;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:#fff;
  font:600 19px/1 system-ui, sans-serif;
  display:grid; place-items:center;
  cursor:pointer;
}
.btn:active      { background:rgba(0,0,0,.7); }
.btn:focus-visible { outline:2px solid #fff; outline-offset:2px; }

#toggle      { top:calc(env(safe-area-inset-top, 0px) + 10px); }
#toggle.off  { opacity:.4; }
#toggle.none { display:none; }

#next        { top:calc(env(safe-area-inset-top, 0px) + 66px); display:none; font-size:16px; }
#next.on     { display:grid; }

/* ---------- Étiquette du thème (mode dev) ---------- */
#badge {
  position:fixed;
  top:calc(env(safe-area-inset-top, 0px) + 10px);
  left:50%; transform:translateX(-50%);
  z-index:10;
  padding:9px 15px;
  border-radius:12px;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:#fff;
  font:600 14px/1 system-ui, sans-serif;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s ease;
}
#badge.show { opacity:1; }

/* ---------- Écran d'aide si l'ID manque ---------- */
#setup {
  position:fixed; inset:0;
  z-index:20;
  display:none;
  place-items:center;
  padding:2rem;
  background:#000;
  color:#fff;
  font:15px/1.6 system-ui, sans-serif;
  text-align:center;
}
#setup.show { display:grid; }
#setup code {
  display:block;
  margin-top:1rem;
  padding:.9rem;
  border-radius:10px;
  background:#161616;
  color:#9fe3a0;
  font:13px/1.5 ui-monospace, monospace;
  word-break:break-all;
}

@media (prefers-reduced-motion: reduce) {
  #chat, #scrim, #badge, .btn { transition:none; }
}
</style>
</head>

<body>

<iframe id="cam"
        allow="camera; microphone; autoplay; display-capture; fullscreen; screen-wake-lock"
        allowfullscreen></iframe>

<div id="scrim"></div>

<iframe id="chat" scrolling="no"></iframe>

<button id="toggle" class="btn" aria-label="Afficher ou masquer le chat">💬</button>
<button id="next"   class="btn" aria-label="Habillage suivant">🎨</button>

<div id="badge" aria-live="polite"></div>

<div id="setup">
  <div>
    Ajoute tes identifiants à la fin de l'adresse.
    <code>#id=TON_ID&amp;pw=TON_MDP&amp;chat=TA_SESSION</code>
  </div>
</div>

<script>
(() => {
  const C = CONFIG;

  /* ------------------------------------------------------------
     Les identifiants viennent du fragment (#), jamais du code.
     Un fragment n'est jamais envoyé au serveur : ni GitHub ni
     Cloudflare ne le voient passer. Le ? est accepté en secours.
     ------------------------------------------------------------ */
  const frag  = new URLSearchParams(location.hash.slice(1));
  const query = new URLSearchParams(location.search);
  const get   = k => (frag.get(k) || query.get(k) || '').trim();
  const has   = k => frag.has(k) || query.has(k);

  const ID      = get('id');
  const PW      = get('pw');
  const SESSION = get('chat');
  const DEV     = has('dev');

  const $      = s => document.querySelector(s);
  const cam    = $('#cam');
  const chat   = $('#chat');
  const scrim  = $('#scrim');
  const toggle = $('#toggle');
  const next   = $('#next');
  const badge  = $('#badge');

  if (!ID) {
    $('#setup').classList.add('show');
    return;
  }

  /* --- La config pilote le CSS --- */
  const root = document.documentElement;
  root.style.setProperty('--scrim',    C.SCRIM);
  root.style.setProperty('--chatH',    C.CHAT_HEIGHT + '%');
  root.style.setProperty('--chatSide', C.CHAT_SIDE + '%');

  chat.classList.add(C.CHAT_ANCHOR);
  scrim.classList.add(C.CHAT_ANCHOR);

  /* --- Couche 1 : la caméra --- */
  let src = 'https://vdo.ninja/?push=' + encodeURIComponent(ID)
          + '&webcam'
          + '&quality='      + C.QUALITY
          + '&videobitrate=' + C.BITRATE
          + '&fullscreen'
          + '&largepreview';

  // Le mot de passe part dans le fragment de l'iframe, pas dans la requête
  if (PW) src += '#password=' + encodeURIComponent(PW);

  cam.src = src;

  /* --- Étiquette passagère --- */
  let timer;
  const flash = txt => {
    badge.textContent = txt;
    badge.classList.add('show');
    clearTimeout(timer);
    timer = setTimeout(() => badge.classList.remove('show'), 1400);
  };

  /* --- Couche 3 : le chat --- */
  const isURL = /^https?:\/\//i.test(SESSION);
  const names = Object.keys(THEMES);
  let index   = Math.max(0, names.indexOf(get('theme') || C.THEME));

  const loadChat = announce => {
    chat.src = isURL
      ? SESSION                                    // URL complète acceptée telle quelle
      : THEMES[names[index]]
          .replace('{SESSION}', encodeURIComponent(SESSION))
          .replace('{CSS}', C.CSS_URL);
    if (announce) flash(names[index]);
  };

  if (SESSION) {
    loadChat(false);
  } else {
    // Pas de session : la caméra fonctionne seule
    chat.style.display  = 'none';
    scrim.style.display = 'none';
    toggle.classList.add('none');
  }

  /* --- Bouton 💬 : afficher / masquer le chat --- */
  let visible = true;
  toggle.addEventListener('click', () => {
    visible = !visible;
    chat.classList.toggle('hidden',  !visible);
    scrim.classList.toggle('hidden', !visible);
    toggle.classList.toggle('off',   !visible);
  });

  /* --- Bouton 🎨 : habillage suivant. Uniquement avec &dev --- */
  if (DEV && SESSION && !isURL) {
    next.classList.add('on');
    next.addEventListener('click', () => {
      index = (index + 1) % names.length;
      loadChat(true);
    });
    flash(names[index]);
  }

  /* --- Garde l'écran allumé --- */
  let lock = null;
  const keepAwake = async () => {
    try { lock = await navigator.wakeLock.request('screen'); }
    catch (e) { /* refusé ou non supporté : la veille système prend le relais */ }
  };
  if ('wakeLock' in navigator) {
    keepAwake();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') keepAwake();
    });
  }

  /* --- Anti-rafraîchissement accidentel --- */
  if (C.CONFIRM_EXIT) {
    window.addEventListener('beforeunload', e => {
      e.preventDefault();
      e.returnValue = '';
    });
  }
})();
</script>

</body>
</html>
