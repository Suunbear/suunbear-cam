<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="robots" content="noindex, nofollow">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>Cam</title>

<script>
/* ============================================================
   SUUNBEAR CAM — caméra du téléphone + chat, pour Twitch
   Aucun secret dans ce fichier : le dépôt peut rester public.

   Favori à mettre sur l'écran d'accueil du téléphone :
   .../suunbear-cam/#id=TON_ID&pw=TON_MDP&chat=TA_SESSION

   « chat » attend l'ID de session Social Stream Ninja, pas une URL.

   Deux temps :
   1. RÉGLAGE — l'interface VDO.Ninja est active, tu choisis ta
      caméra et tu appuies sur Start.
   2. DIRECT — tu appuies sur VERROUILLER. L'écran devient inerte,
      le chat apparaît, et mes propres boutons prennent le relais.
   ============================================================ */
const CONFIG = {

  /* ---------- Caméra (VDO.Ninja) ---------- */
  QUALITY : 0,        // 0 = 1080p | 1 = 720p | 2 = 360p
  BITRATE : 4000,     // kbps. Descendre à 2500 si ça saccade en 4G

  /* ---------- Chat ---------- */
  MAX      : 8,       // nombre de messages gardés à l'écran
  LIFETIME : 30,      // secondes avant qu'un message s'efface. 0 = jamais
  KEEP     : 2,       // les X derniers messages ne s'effacent jamais
  FONT     : 18,      // taille du texte en px

  AVATARS  : true,    // photo de profil
  ICONS    : true,    // icône de la plateforme (Twitch, YouTube…)
  BADGES   : 99,      // nombre max de badges Twitch. 99 = tous, 0 = aucun
  LINES    : 6,       // lignes max par message, au-delà ça coupe
  FADE_OLD : true,    // les anciens messages s'estompent doucement

  /* ---------- Placement ---------- */
  CHAT_HEIGHT : 45,   // % de la hauteur d'écran réservée au chat
  CHAT_SIDE   : 3,    // marge gauche/droite en %
  CHAT_BOTTOM : 28,   // marge basse en px, au-dessus de la barre de gestes
  SCRIM       : 0.45, // voile sombre derrière le chat. 0 = aucun

  /* ---------- Sécurité ---------- */
  CONFIRM_EXIT : true // confirmation avant de quitter ou rafraîchir
};

/* Couleur de la barre latérale, selon la plateforme d'origine. */
const PLATFORM = {
  twitch:'#9146ff', youtube:'#ff0033', youtubeshorts:'#ff0033', kick:'#53fc18',
  tiktok:'#ff0050', discord:'#5865f2', instagram:'#e1306c', facebook:'#1877f2',
  x:'#e7e9ea', twitter:'#e7e9ea', telegram:'#2aabee', trovo:'#1cb46c',
  rumble:'#85c742', reddit:'#ff4500', slack:'#e01e5a', zoom:'#2d8cff'
};

/* Boutons de VDO.Ninja à masquer une fois l'écran verrouillé.
   On joue sur l'opacité : c'est réversible proprement.
   Un identifiant absent ne provoque rien. */
const VDO_UI = '#header,#controlButtons,#mutebutton,#mutevideobutton,'
             + '#hangupbutton,#settingsbutton,#screensharebutton,#chatbutton,'
             + '#raisehandbutton,#recordLocalbutton,#helpbutton,#reportbutton,'
             + '#translationbutton,#toggleSettingsButton,#logoname,#info,#qos,'
             + '#mainmenu,#chatModule,#nextbutton,#previousbutton';
</script>

<style>
:root {
  --scrim  : 0.45;
  --chatH  : 56%;
  --side   : 3%;
  --bottom : 28px;
  --font   : 18px;
  --lines  : 3;
  --accent : #8a8f98;
  --purple : #9146ff;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background:#000;
  overflow:hidden;
  overscroll-behavior:none;               /* tue le pull-to-refresh */
  -webkit-tap-highlight-color:transparent;
  font-family:system-ui, -apple-system, Roboto, "Segoe UI", sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ================= Couche 1 : la caméra ================= */
#cam {
  position:fixed; inset:0;
  width:100%; height:100%;
  border:0;
  z-index:1;
}
body.live #cam { pointer-events:none; }   /* plus aucun tap accidentel */

/* ================= Couche 2 : le voile ================= */
#scrim {
  position:fixed; left:0; right:0; bottom:0;
  height:calc(var(--chatH) + 8%);
  z-index:2;
  pointer-events:none;
  opacity:0;
  background:linear-gradient(to top, #000 0%, rgba(0,0,0,.65) 40%, transparent 100%);
  transition:opacity .3s ease;
}
body.live #scrim          { opacity:var(--scrim); }
body.live #scrim.hidden   { opacity:0; }

/* ================= Couche 3 : le chat =================
   column-reverse : le plus récent se pose en bas, les vieux
   sortent par le haut. Aucun défilement, donc rien ne peut
   se retrouver hors de l'écran. */
#feed {
  position:fixed;
  left:var(--side); right:var(--side);
  bottom:calc(env(safe-area-inset-bottom, 0px) + var(--bottom));
  max-height:var(--chatH);
  z-index:3;
  pointer-events:none;
  display:none;
  flex-direction:column-reverse;
  align-items:flex-start;
  gap:6px;
  overflow:hidden;
  transition:opacity .3s ease;
}
body.live #feed        { display:flex; }
body.live #feed.hidden { opacity:0; }

.msg {
  --o:.62;
  flex-shrink:0;                          /* sinon flexbox écrase le message du bas */
  max-width:100%;
  padding:6px 12px 7px;
  border-left:3px solid var(--accent);
  border-radius:3px 15px 15px 3px;
  background:rgba(0,0,0,.58);            /* 50-70 % : lisible sur tout fond */
  color:#fff;
  font-size:var(--font);
  line-height:1.34;
  word-wrap:break-word;
  overflow-wrap:anywhere;
  text-shadow:0 1px 2px #000, 0 2px 10px rgba(0,0,0,.9);
  opacity:var(--o);
  transform:translateY(0);
  transition:opacity .45s ease, transform .3s cubic-bezier(.2,.9,.3,1);

  display:-webkit-box;                    /* coupe les pavés interminables */
  -webkit-line-clamp:var(--lines);
  -webkit-box-orient:vertical;
}

/* Dégradé de fraîcheur : le dernier message est le plus net. */
#feed.fade .msg:nth-child(1) { --o:1;   }
#feed.fade .msg:nth-child(2) { --o:.94; }
#feed.fade .msg:nth-child(3) { --o:.88; }
#feed.fade .msg:nth-child(4) { --o:.82; }
#feed.fade .msg:nth-child(5) { --o:.76; }
#feed.fade .msg:nth-child(6) { --o:.70; }

.msg.enter { opacity:0; transform:translateY(18px); }
.msg.gone  { opacity:0 !important; transform:translateY(-10px); }

.av  { width:1.3em; height:1.3em; border-radius:50%; object-fit:cover;
       vertical-align:-.28em; margin-right:.32em; background:#333; }
.bdg { height:.95em; vertical-align:-.08em; margin-right:.2em; }
.nm  { font-weight:700; color:#ffc14d; margin-right:.15em; }
.src { width:.9em; height:.9em; vertical-align:-.05em; margin:0 .3em 0 .1em; }
.don { color:#4ade80; font-weight:700; margin-right:.3em; }
.tx img   { max-height:1.5em; vertical-align:-.35em; }
.media    { display:block; max-width:100%; max-height:110px;
            margin-top:6px; border-radius:9px; }

/* ================= Barre du haut ================= */
#bar {
  position:fixed;
  top:calc(env(safe-area-inset-top, 0px) + 10px);
  left:10px; right:10px;
  z-index:10;
  display:none;
  align-items:center;
  gap:8px;
}
body.live #bar { display:flex; }

#dot {
  display:flex; align-items:center; gap:7px;
  padding:0 12px; height:40px;
  border-radius:12px;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  color:#fff;
  font:600 13px/1 system-ui, sans-serif;
}
#dot::before {
  content:''; width:9px; height:9px; border-radius:50%;
  background:#71767b;
  transition:background .3s ease, box-shadow .3s ease;
}
#dot.on::before { background:#4ade80; box-shadow:0 0 9px #4ade80; }

#spacer { flex:1; }

.btn {
  width:44px; height:44px;
  border:0; border-radius:13px;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  color:#fff;
  font:600 18px/1 system-ui, sans-serif;
  display:grid; place-items:center;
  cursor:pointer;
  position:relative;
  flex-shrink:0;
}
.btn:active        { background:rgba(0,0,0,.75); }
.btn:focus-visible { outline:2px solid #fff; outline-offset:2px; }
.btn.off           { opacity:.45; }
.btn.none          { display:none; }

#unread {
  position:absolute; top:-5px; right:-5px;
  min-width:20px; height:20px; padding:0 5px;
  border-radius:10px;
  background:#e0245e;
  color:#fff;
  font:700 11px/20px system-ui, sans-serif;
  text-align:center;
  display:none;
}
#unread.on { display:block; }

/* ================= Menu ================= */
#menu {
  position:fixed;
  top:calc(env(safe-area-inset-top, 0px) + 62px);
  right:10px;
  z-index:11;
  width:210px;
  padding:6px;
  border-radius:15px;
  background:rgba(16,16,18,.92);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  box-shadow:0 10px 34px rgba(0,0,0,.6);
  display:none;
}
#menu.open { display:block; }
#menu button {
  display:flex; align-items:center; gap:11px;
  width:100%; padding:12px 13px;
  border:0; border-radius:10px;
  background:transparent;
  color:#fff;
  font:500 15px/1 system-ui, sans-serif;
  text-align:left;
  cursor:pointer;
}
#menu button:active { background:rgba(255,255,255,.12); }
#menu button.danger { color:#ff6b6b; }
#menu hr { border:0; height:1px; background:rgba(255,255,255,.12); margin:5px 9px; }

/* ================= Écran de réglage ================= */
#go {
  position:fixed;
  left:16px; right:16px;
  bottom:calc(env(safe-area-inset-bottom, 0px) + 22px);
  z-index:10;
  padding:17px;
  border:0; border-radius:16px;
  background:var(--purple);
  color:#fff;
  font:700 17px/1.25 system-ui, sans-serif;
  box-shadow:0 8px 26px rgba(145,70,255,.45);
  cursor:pointer;
}
#go small {
  display:block;
  margin-top:5px;
  font-weight:500;
  font-size:12.5px;
  opacity:.82;
}
#go:active   { transform:scale(.985); }
body.live #go { display:none; }

/* ================= Message passager ================= */
#toast {
  position:fixed;
  left:50%; transform:translateX(-50%);
  top:calc(env(safe-area-inset-top, 0px) + 64px);
  z-index:12;
  max-width:80%;
  padding:10px 16px;
  border-radius:13px;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  color:#fff;
  font:600 14px/1.3 system-ui, sans-serif;
  text-align:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .22s ease;
}
#toast.show { opacity:1; }

/* ================= Écran d'aide ================= */
#setup {
  position:fixed; inset:0;
  z-index:20;
  display:none;
  place-items:center;
  padding:2rem;
  background:#000;
  color:#fff;
  font:15px/1.6 system-ui, sans-serif;
  text-align:center;
}
#setup.show { display:grid; }
#setup code {
  display:block;
  margin-top:1rem;
  padding:.9rem;
  border-radius:10px;
  background:#161616;
  color:#9fe3a0;
  font:13px/1.5 ui-monospace, monospace;
  word-break:break-all;
}

@media (prefers-reduced-motion: reduce) {
  .msg, #feed, #scrim, #toast, #go { transition:none; }
}
</style>
</head>

<body>

<iframe id="cam"
        allow="camera; microphone; autoplay; display-capture; fullscreen; screen-wake-lock"
        allowfullscreen></iframe>

<div id="scrim"></div>
<div id="feed"></div>

<div id="bar">
  <div id="dot">PC</div>
  <div id="spacer"></div>
  <button class="btn" id="bMic"  aria-label="Couper le micro">🎤</button>
  <button class="btn" id="bChat" aria-label="Afficher ou masquer le chat">💬<span id="unread"></span></button>
  <button class="btn" id="bMenu" aria-label="Plus d'options">⋯</button>
</div>

<div id="menu">
  <button id="mCam">🔄 &nbsp;Caméra suivante</button>
  <button id="mLock">🔓 &nbsp;Déverrouiller l'écran</button>
  <hr>
  <button id="mEnd" class="danger">⏻ &nbsp;Raccrocher</button>
</div>

<button id="go">
  VERROUILLER L'ÉCRAN
  <small>À faire une fois la caméra lancée</small>
</button>

<div id="toast"></div>

<div id="setup">
  <div>
    Ajoute tes identifiants à la fin de l'adresse.
    <code>#id=TON_ID&amp;pw=TON_MDP&amp;chat=TA_SESSION</code>
  </div>
</div>

<script>
(() => {
  const C = CONFIG;

  /* ------------------------------------------------------------
     Les identifiants viennent du fragment (#), jamais du code.
     Un fragment n'est jamais envoyé au serveur : ni GitHub ni
     Cloudflare ne le voient passer. Le ? est accepté en secours.
     ------------------------------------------------------------ */
  const frag  = new URLSearchParams(location.hash.slice(1));
  const query = new URLSearchParams(location.search);
  const get   = k => (frag.get(k) || query.get(k) || '').trim();

  /* ------------------------------------------------------------
     En mode application, l'icône de l'écran d'accueil ouvre
     l'adresse SANS le #. On garde donc une copie locale des
     identifiants, sur le téléphone uniquement, rien ne sort.
     Ajoute &reset à l'adresse pour tout effacer.
     ------------------------------------------------------------ */
  const KEY = 'suunbearcam.';
  const save = (k, v) => { try { localStorage.setItem(KEY + k, v); } catch (e) {} };
  const load = k       => { try { return localStorage.getItem(KEY + k) || ''; } catch (e) { return ''; } };

  if (frag.has('reset') || query.has('reset')) {
    ['id', 'pw', 'chat'].forEach(k => { try { localStorage.removeItem(KEY + k); } catch (e) {} });
  }

  const pick = k => {
    const v = get(k);
    if (v) { save(k, v); return v; }
    return load(k);
  };

  const ID      = pick('id');
  const PW      = pick('pw');
  const SESSION = pick('chat');

  const $     = s => document.querySelector(s);
  const cam   = $('#cam'),  feed  = $('#feed'), scrim = $('#scrim');
  const dot   = $('#dot'),  menu  = $('#menu'), toastEl = $('#toast');
  const bMic  = $('#bMic'), bChat = $('#bChat'), bMenu = $('#bMenu');
  const unread = $('#unread');

  if (!ID) { $('#setup').classList.add('show'); return; }

  /* --- La config pilote le CSS --- */
  const root = document.documentElement;
  root.style.setProperty('--scrim',  C.SCRIM);
  root.style.setProperty('--chatH',  C.CHAT_HEIGHT + '%');
  root.style.setProperty('--side',   C.CHAT_SIDE + '%');
  root.style.setProperty('--bottom', C.CHAT_BOTTOM + 'px');
  root.style.setProperty('--font',   C.FONT + 'px');
  root.style.setProperty('--lines',  C.LINES);
  if (C.FADE_OLD) feed.classList.add('fade');

  /* --- Petit message passager --- */
  let toastTimer;
  const toast = txt => {
    toastEl.textContent = txt;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1700);
  };

  /* ============================================================
     Couche 1 — la caméra
     ============================================================ */
  let src = 'https://vdo.ninja/?push=' + encodeURIComponent(ID)
          + '&webcam'
          + '&quality='      + C.QUALITY
          + '&videobitrate=' + C.BITRATE
          + '&fullscreen'
          + '&largepreview';

  // Le mot de passe part dans le fragment de l'iframe, pas dans la requête
  if (PW) src += '#password=' + encodeURIComponent(PW);

  cam.src = src;

  /* Commande envoyée à VDO.Ninja (API IFRAME officielle) */
  const cmd = m => { try { cam.contentWindow.postMessage(m, '*'); } catch (e) {} };

  /* ============================================================
     Verrouillage de l'écran
     ============================================================ */
  const lock = () => {
    document.body.classList.add('live');
    cmd({ style: VDO_UI + '{opacity:0 !important;}' });   // ses boutons disparaissent
    cmd({ getDeviceList: true, cib: 'devices' });         // pour le bouton caméra
    toast('Écran verrouillé');
  };

  const unlock = () => {
    document.body.classList.remove('live');
    menu.classList.remove('open');
    cmd({ style: VDO_UI + '{opacity:1 !important;}' });
    toast('Écran déverrouillé');
  };

  $('#go').addEventListener('click', lock);
  $('#mLock').addEventListener('click', unlock);

  /* ============================================================
     Contrôles
     ============================================================ */

  /* --- Micro --- */
  let micOn = true;
  bMic.addEventListener('click', () => {
    micOn = !micOn;
    cmd({ mic: micOn });
    bMic.textContent = micOn ? '🎤' : '🔇';
    bMic.classList.toggle('off', !micOn);
    toast(micOn ? 'Micro actif' : 'Micro coupé');
  });

  /* --- Menu --- */
  bMenu.addEventListener('click', e => {
    e.stopPropagation();
    menu.classList.toggle('open');
  });
  document.addEventListener('click', e => {
    if (!menu.contains(e.target) && e.target !== bMenu) menu.classList.remove('open');
  });

  /* --- Caméra suivante --- */
  let cams = [], camIdx = 0;
  $('#mCam').addEventListener('click', () => {
    menu.classList.remove('open');
    if (cams.length < 2) { toast('Une seule caméra détectée'); return; }
    camIdx = (camIdx + 1) % cams.length;
    cmd({ changeVideoDevice: cams[camIdx].deviceId });
    toast(cams[camIdx].label || ('Caméra ' + (camIdx + 1)));
  });

  /* --- Raccrocher --- */
  $('#mEnd').addEventListener('click', () => {
    menu.classList.remove('open');
    if (confirm('Raccrocher et couper la caméra ?')) {
      cmd({ close: true });
      toast('Caméra coupée');
    }
  });

  /* ============================================================
     Couche 3 — le chat
     Les messages arrivent de Social Stream Ninja par WebRTC,
     via un iframe invisible. On les redessine nous-mêmes.
     ============================================================ */
  let pipe = null, visible = true, missed = 0, counter = 0;

  const esc = s => String(s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));

  const draw = d => {
    const el = document.createElement('div');
    el.className = 'msg enter';
    el.dataset.mid  = String(d.mid || d.id || ('m' + (++counter)));
    el.dataset.name = d.chatname ? String(d.chatname) : '';
    el.style.setProperty('--accent', PLATFORM[d.type] || '#8a8f98');

    let h = '';

    if (C.AVATARS && d.chatimg) {
      h += '<img class="av" src="' + esc(d.chatimg) + '" onerror="this.remove()">';
    }

    if (C.BADGES > 0 && Array.isArray(d.chatbadges)) {
      d.chatbadges.slice(0, C.BADGES).forEach(b => {
        if (typeof b === 'string') {
          h += '<img class="bdg" src="' + esc(b) + '" onerror="this.remove()">';
        } else if (b && b.type === 'img' && b.src) {
          h += '<img class="bdg" src="' + esc(b.src) + '" onerror="this.remove()">';
        } else if (b && b.type === 'svg' && b.html) {
          h += '<span class="bdg">' + b.html + '</span>';
        }
      });
    }

    if (d.chatname) {
      const col = d.nameColor ? ' style="color:' + esc(d.nameColor) + '"' : '';
      h += '<span class="nm"' + col + '>' + esc(d.chatname) + '</span>';
    }

    if (C.ICONS && d.type) {
      h += '<img class="src" src="https://socialstream.ninja/sources/images/'
         + encodeURIComponent(d.type) + '.png" onerror="this.remove()">';
    }

    if (d.hasDonation) h += '<span class="don">' + esc(d.hasDonation) + '</span>';
    if (d.chatmessage) h += '<span class="tx">' + d.chatmessage + '</span>';
    if (d.contentimg)  h += '<img class="media" src="' + esc(d.contentimg) + '" onerror="this.remove()">';

    el.innerHTML = h;

    el.dataset.t = Date.now();

    feed.prepend(el);              // column-reverse : ça se pose en bas
    void el.offsetWidth;           // force le calcul avant l'animation
    el.classList.remove('enter');

    // Le plus ancien est le dernier du DOM
    while (feed.children.length > C.MAX) feed.lastElementChild.remove();

    if (!visible) {
      missed++;
      unread.textContent = missed > 99 ? '99+' : missed;
      unread.classList.add('on');
    }
  };

  const drop = test => [...feed.children].forEach(el => { if (test(el)) el.remove(); });

  /* Efface les messages périmés — sauf les plus récents, qui restent
     affichés quoi qu'il arrive. Chat calme : tu retrouves les derniers
     messages en revenant. Chat animé : tout le reste s'efface. */
  if (C.LIFETIME > 0) {
    setInterval(() => {
      const now = Date.now();
      [...feed.children].forEach((el, i) => {
        if (i < C.KEEP) return;                       // protégé
        if (el.classList.contains('gone')) return;    // déjà en train de partir
        if (now - Number(el.dataset.t) < C.LIFETIME * 1000) return;
        el.classList.add('gone');
        setTimeout(() => el.remove(), 500);
      });
    }, 1000);
  }

  const handle = d => {
    if (!d || typeof d !== 'object') return;
    if (d.content) d = d.content;

    if ('clearAll' in d || d.action === 'clear' || d.action === 'clearAll') {
      feed.innerHTML = ''; return;
    }
    if ('deleteMessage' in d) {
      drop(el => el.dataset.mid === String(d.deleteMessage)); return;
    }
    if (d.delete && typeof d.delete === 'object') {
      const t = d.delete;
      drop(el => (t.id && el.dataset.mid === String(t.id))
              || (t.chatname && el.dataset.name === String(t.chatname)));
      return;
    }
    if (d.timeoutUser || d.blockUser) {
      const u = d.timeoutUser || d.blockUser;
      const n = u.chatname || u.username;
      if (n) drop(el => el.dataset.name === String(n));
      return;
    }

    if (!d.chatmessage && !d.hasDonation && !d.contentimg) return;
    draw(d);
  };

  if (SESSION) {
    pipe = document.createElement('iframe');
    pipe.src = 'https://vdo.socialstream.ninja/?ln&salt=vdo.ninja&notmobile'
             + '&password=false&push&label=dock&vd=0&ad=0'
             + '&novideo&noaudio&autostart&cleanoutput'
             + '&room=' + encodeURIComponent(SESSION);
    pipe.style.cssText = 'width:0;height:0;position:fixed;left:-100px;top:-100px;border:0;';
    document.body.appendChild(pipe);

    bChat.addEventListener('click', () => {
      visible = !visible;
      feed.classList.toggle('hidden',  !visible);
      scrim.classList.toggle('hidden', !visible);
      bChat.classList.toggle('off',    !visible);
      if (visible) { missed = 0; unread.classList.remove('on'); }
    });
  } else {
    bChat.classList.add('none');
  }

  /* ============================================================
     Écoute des deux iframes
     ============================================================ */
  let viewers = 0, everSeen = false;

  /* VDO.Ninja ne signale pas les connexions sur toutes les configurations.
     Si rien n'arrive en 25 secondes, le voyant s'efface de lui-même :
     mieux vaut pas de voyant qu'un voyant qui ment. */
  setTimeout(() => { if (!everSeen) dot.style.display = 'none'; }, 25000);

  window.addEventListener('message', e => {

    /* --- Chat --- */
    if (pipe && e.source === pipe.contentWindow) {
      const r = e.data && e.data.dataReceived;
      if (r && typeof r === 'object' && r.overlayNinja) handle(r.overlayNinja);
      return;
    }

    /* --- Caméra --- */
    if (e.source !== cam.contentWindow) return;
    const d = e.data;
    if (!d || typeof d !== 'object') return;

    // Liste des caméras du téléphone
    if (d.cib === 'devices' && Array.isArray(d.deviceList)) {
      cams = d.deviceList.filter(x => x && x.kind === 'videoinput');
    }

    // Le PC (OBS) reçoit-il le flux ?
    // VDO.Ninja nomme l'événement différemment selon qui se connecte
    // en premier, alors on les accepte tous.
    if (d.action === 'view-connection'   || d.action === 'push-connection'
     || d.action === 'scene-connected'   || d.action === 'guest-connected'
     || d.action === 'director-connected') {
      everSeen = true;
      viewers = Math.max(0, viewers + (d.value === false ? -1 : 1));
      dot.classList.toggle('on', viewers > 0);
      dot.textContent = viewers > 0 ? 'PC' : 'PC ?';
    }
  });

  /* ============================================================
     Confort
     ============================================================ */

  /* --- Garde l'écran allumé --- */
  let awake = null;
  const keepAwake = async () => {
    try { awake = await navigator.wakeLock.request('screen'); }
    catch (e) { /* refusé ou non supporté : la veille système prend le relais */ }
  };
  if ('wakeLock' in navigator) {
    keepAwake();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') keepAwake();
    });
  }

  /* --- Anti-rafraîchissement accidentel --- */
  if (C.CONFIRM_EXIT) {
    window.addEventListener('beforeunload', e => {
      e.preventDefault();
      e.returnValue = '';
    });
  }
})();
</script>
